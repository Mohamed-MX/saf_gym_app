# SAF Gym — Render Deployment Config
# Render reads this file automatically.
# Make sure your repo root is set to the `backend/` folder
# OR set the root directory in Render's settings.

services:
  - type: web
    name: saf-gym-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
